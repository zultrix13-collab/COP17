name: ci-flutter
on:
  pull_request:
    paths: ['apps/mobile/**', '.github/workflows/ci-flutter.yml']
  push:
    branches: [main]
    paths: ['apps/mobile/**']
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.x
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # NOTE: `flutter build apk` is intentionally not run here. The Android
      # project (apps/mobile/android) is gitignored along with its secrets
      # (keystore, key.properties, google-services.json), so a CI runner cannot
      # build it. iOS builds require macOS + signing and run locally/manually.
      # analyze + test cover the Dart/Flutter code; native builds are verified
      # at release time via build_testflight.sh / build_playstore.sh.
