name: ci-flutter
on:
  pull_request:
    paths: ['apps/mobile/**', '.github/workflows/ci-flutter.yml']
  push:
    branches: [main]
    paths: ['apps/mobile/**']
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.x
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
