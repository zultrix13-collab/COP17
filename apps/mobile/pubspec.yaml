name: cop17
description: "COP17 — UNCCD Ulaanbaatar 2026 mobile app"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Network + storage
  supabase_flutter: ^2.8.0
  dio: ^5.7.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Auth + device
  local_auth: ^2.3.0
  mobile_scanner: ^6.0.10
  flutter_nfc_kit: ^3.5.2

  # Maps + location
  flutter_map: ^7.0.2
  geolocator: ^13.0.1
  latlong2: ^0.9.1

  # Push + i18n
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/brand/
