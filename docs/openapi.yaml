openapi: 3.1.0
info:
  title: COP17 API
  version: 0.1.0
  description: UNCCD COP17 Ulaanbaatar 2026 — mobile + admin API
servers:
  - url: http://localhost:3000/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Tier:
      type: string
      enum: [green, blue, vip, exhibitor, press]
    Locale:
      type: string
      enum: [mn, en]
    User:
      type: object
      required: [id, email, name, tier, locale]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        tier: { $ref: '#/components/schemas/Tier' }
        locale: { $ref: '#/components/schemas/Locale' }
    TokenPair:
      type: object
      required: [accessToken, refreshToken, tokenType]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string, default: Bearer }
paths:
  /health:
    get:
      summary: Health check
      responses: { "200": { description: ok } }
  /auth/otp/request:
    post:
      summary: Request OTP code via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "202": { description: OTP queued }
  /auth/otp/verify:
    post:
      summary: Verify OTP and issue tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        "401": { description: Invalid or expired code }
  /auth/refresh:
    post:
      summary: Rotate refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
  /users/me:
    get:
      summary: Current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
