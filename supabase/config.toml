project_id = "cop17"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "cop17://auth-callback"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true
# OTP code (not magic link) — "{{ .Token }}" style template
template = { subject = "COP17 — Таны нэвтрэх код", content_path = "./supabase/templates/otp.html" }

[auth.sms]
enable_signup = false
enable_confirmations = false

[functions]
verify_jwt = false

[realtime]
enabled = true
