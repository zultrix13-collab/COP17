<!doctype html>
<html>
  <body style="font-family: -apple-system, sans-serif; background: #f0fdf4; padding: 24px;">

      <div style="font-size: 24px;">🌿</div>
      <div style="font-weight: 800; font-size: 20px; color: #111;">COP17</div>

      <p style="color: #111; font-size: 14px;">Таны нэвтрэх код:</p>
      <div style="font-size: 32px; font-weight: 800; letter-spacing: 6px; color: #111; background: #f0fdf4; padding: 14px; text-align: center; border-radius: 8px; margin: 12px 0;">
        {{ .Token }}
      </div>
      <p style="font-size: 12px; color: #888;">Код 5 минут хүчинтэй. Хэрэв та хүсэлт илгээгээгүй бол энэ и-мэйлийг үл хэрэгсэнэ үү.</p>
    </div>
